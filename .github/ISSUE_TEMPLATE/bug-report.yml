name: Bug report
description: Report a site bug or regression.
title: "[Bug] "
labels: ["frontend"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please complete all fields."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Briefly describe the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Attach visuals if available.
  - type: dropdown
    id: a11y
    attributes:
      label: Accessibility impact
      options:
        - None known
        - Minor
        - Major
    validations:
      required: true
