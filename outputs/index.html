<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Outputs | Contributor Catalyst Program</title>
    <meta name="description" content="Filter and browse contributor outputs by year, type, and topic." />
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/pages.css" />
  </head>
  <body data-root="../" data-page="outputs">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <header id="site-header"></header>

    <main id="main-content" class="container section">
      <h1>Outputs</h1>
      <p class="placeholder-note">
        Add final links for published artifacts, demos, and media once available.
      </p>

      <section aria-labelledby="filters-heading" class="filters-panel">
        <h2 id="filters-heading">Filter Outputs</h2>
        <form id="outputs-filters" class="filters-grid">
          <label for="filter-year">
            Year
            <select id="filter-year" name="year">
              <option value="all">All years</option>
            </select>
          </label>
          <label for="filter-type">
            Type
            <select id="filter-type" name="type">
              <option value="all">All types</option>
            </select>
          </label>
          <label for="filter-topic">
            Topic
            <select id="filter-topic" name="topic">
              <option value="all">All topics</option>
            </select>
          </label>
        </form>
      </section>

      <section aria-live="polite" aria-label="Filtered outputs">
        <p id="outputs-count"></p>
        <div id="outputs-list" class="cards-grid"></div>
      </section>
    </main>

    <footer id="site-footer"></footer>
    <script src="../assets/js/site.js" defer></script>
    <script src="../assets/js/filters.js" defer></script>
  </body>
</html>
